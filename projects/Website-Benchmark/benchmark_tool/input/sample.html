<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Benchmark Tool Universal Sample</title>
    <meta
      name="description"
      content="Sample HTML used to verify generic structure, feature, and flow extraction."
    />
  </head>
  <body>
    <header>
      <nav>
        <a href="/">Home</a>
        <a href="/reports">Reports</a>
        <a href="/account">Account</a>
      </nav>
    </header>

    <main>
      <section>
        <h1>Data Explorer</h1>
        <form action="/api/search" method="get">
          <input type="search" name="query" placeholder="Search records" />
          <select name="status">
            <option>All</option>
            <option>Active</option>
            <option>Archived</option>
          </select>
          <button type="submit">Search</button>
        </form>
      </section>

      <section>
        <h2>Sign In</h2>
        <form action="/api/login" method="post">
          <input type="email" name="email" placeholder="Email" />
          <input type="password" name="password" placeholder="Password" />
          <button type="submit">Log In</button>
        </form>
      </section>

      <section>
        <h2>Result Table</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Owner</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Pipeline A</td>
              <td>Active</td>
              <td>Kim</td>
            </tr>
            <tr>
              <td>Pipeline B</td>
              <td>Archived</td>
              <td>Park</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section>
        <h2>Recent Alerts</h2>
        <ul>
          <li>New record imported</li>
          <li>Search index refreshed</li>
          <li>User access updated</li>
        </ul>
      </section>
    </main>

    <script>
      fetch("/api/results");
      const xhr = new XMLHttpRequest();
      xhr.open("GET", "/api/filters");
    </script>
  </body>
</html>
