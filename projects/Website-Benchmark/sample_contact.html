<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Orbit Analytics | Contact</title>
    <meta
      name="description"
      content="Request a live demo, ask product questions, or talk to Orbit Analytics support."
    />
  </head>
  <body>
    <header>
      <nav aria-label="Primary">
        <a href="sample_home.html">Home</a>
        <a href="sample_pricing.html">Pricing</a>
        <a href="sample_contact.html">Contact</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Talk to the Orbit team</h1>
        <p>Book a demo or send a product question.</p>
      </section>

      <section class="contact-form">
        <h2>Request a demo</h2>
        <form action="/demo-request" method="post">
          <input type="text" name="name" placeholder="Name" />
          <input type="email" name="email" placeholder="Work email" />
          <input type="text" name="company" placeholder="Company" />
          <textarea name="message" placeholder="Tell us about your use case"></textarea>
          <button type="submit">Send request</button>
        </form>
      </section>
    </main>

    <footer>
      <a href="sample_home.html">Overview</a>
      <a href="sample_pricing.html">Plans</a>
    </footer>
  </body>
</html>
