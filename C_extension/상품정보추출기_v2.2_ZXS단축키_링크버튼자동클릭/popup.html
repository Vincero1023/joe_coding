<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 0;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .menu-item {
      padding: 15px 20px;
      border-bottom: 1px solid #e0e0e0;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .menu-item:last-child {
      border-bottom: none;
    }
    .menu-item:hover {
      background: #f5f5f5;
    }
    .menu-item:active {
      background: #e8e8e8;
    }
    .icon {
      font-size: 20px;
    }
    .label {
      font-size: 14px;
      color: #333;
      flex: 1;
    }
    .shortcut {
      font-size: 11px;
      color: #999;
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .success {
      background: #4CAF50 !important;
      color: white;
    }
    .success .label {
      color: white;
    }
    .success .shortcut {
      background: rgba(255,255,255,0.2);
      color: white;
    }
  </style>
</head>
<body>
  <div class="menu-item" id="copyName">
    <span class="icon">📝</span>
    <span class="label">상품명 복사</span>
    <span class="shortcut">Ctrl+Shift+Z</span>
  </div>
  <div class="menu-item" id="copyLink">
    <span class="icon">🔗</span>
    <span class="label">링크 복사</span>
    <span class="shortcut">Ctrl+Shift+X</span>
  </div>
  <div class="menu-item" id="copyImages">
    <span class="icon">🖼️</span>
    <span class="label">이미지 URL 복사</span>
    <span class="shortcut">Ctrl+Shift+S</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
