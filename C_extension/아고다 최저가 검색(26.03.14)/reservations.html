<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Agoda Best - 예약 추적기</title>
    <link rel="icon" href="agoda-best-favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="reservations.css">
  </head>
  <body>
    <main class="page">
      <section class="panel hero">
        <div class="brand-row">
          <span class="brand-badge">AB</span>
          <div>
            <p class="eyebrow">Agoda Best</p>
            <h1>예약 가격 추적기</h1>
          </div>
        </div>
        <p class="hero-copy">
          저장한 Agoda 예약 URL을 최대 5개까지 관리하고, 같은 스캔 엔진으로 다시 확인해서 가격이 내려가면 빠르게 재예약 여부를 판단할 수 있습니다.
        </p>
        <div class="toolbar">
          <button id="refreshButton" type="button" class="secondary">새로고침</button>
        </div>
        <div class="meta-row">
          <p id="savedCount" class="status-text"></p>
          <p id="monitoringText" class="subtle"></p>
        </div>
        <p id="pageStatus" class="panel-note"></p>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>직접 등록</h2>
          <p class="panel-note">호텔 상세 URL과 예약 금액만 있으면 바로 등록할 수 있습니다.</p>
        </div>
        <div class="manual-form">
          <label class="field">
            <span>호텔 이름</span>
            <input id="hotelNameInput" type="text" placeholder="예: 콘래드 다롄">
          </label>
          <label class="field field-wide">
            <span>Agoda 호텔 URL</span>
            <input id="reservationUrlInput" type="url" placeholder="https://www.agoda.com/.../hotel/...">
          </label>
          <label class="field">
            <span>예약 가격</span>
            <input id="priceBookedInput" type="number" min="0" step="1" placeholder="181659">
          </label>
          <label class="field">
            <span>통화</span>
            <input id="currencyInput" type="text" value="KRW" maxlength="5">
          </label>
        </div>
        <div class="toolbar compact">
          <button id="saveManualButton" type="button" class="primary">URL로 직접 등록</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>추적 중인 예약</h2>
          <p class="panel-note">예약이 하나 이상 저장되면 24시간마다 자동 확인을 실행합니다.</p>
        </div>
        <div id="emptyState" class="empty-state">아직 저장된 예약이 없습니다. 결과 탭에서 저장하거나 위 폼으로 직접 등록해 주세요.</div>
        <div id="tableWrap" class="table-wrap hidden">
          <table class="reservations-table">
            <thead>
              <tr>
                <th>호텔</th>
                <th>예약 가격</th>
                <th>현재 최저가</th>
                <th>상태</th>
                <th>액션</th>
              </tr>
            </thead>
            <tbody id="reservationsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="reservations.js"></script>
  </body>
</html>
