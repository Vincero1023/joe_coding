<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Agoda Best</title>
    <link rel="icon" href="agoda-best-favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <section class="panel hero">
        <div class="brand-row">
          <span class="brand-badge">AB</span>
          <div>
            <p class="eyebrow">Agoda Best</p>
            <h1>Agoda 최저가를 빠르게 비교합니다.</h1>
          </div>
        </div>
        <p class="hero-copy">
          현재 Agoda 호텔 상세 페이지를 기준으로 여러 캠페인 경로를 스캔하고, 결과 탭에서 최저가 링크와 예약 추적을 바로 확인합니다.
        </p>
        <div class="action-row">
          <button id="scanButton" type="button" class="primary">상위 3개 검색</button>
          <button id="scanAndOpenButton" type="button" class="secondary">검색 후 1위 열기</button>
          <button id="openResultsButton" type="button" class="secondary">결과 탭</button>
          <button id="openReservationsButton" type="button" class="secondary">예약 추적기</button>
          <button id="stopButton" type="button" class="ghost" disabled>중지</button>
        </div>
        <p id="statusText" class="status"></p>
        <p id="scanSummary" class="summary"></p>
      </section>

      <section class="panel settings">
        <div class="panel-head">
          <h2>스캔 설정</h2>
          <button id="resetButton" type="button" class="ghost mini">초기화</button>
        </div>

        <label class="toggle">
          <input id="autoRunInput" type="checkbox">
          <span>Agoda 호텔 상세 페이지에서 팝업을 열면 자동으로 스캔 시작</span>
        </label>

        <div class="group-block">
          <div class="group-head">
            <div>
              <h3>기본 / 유입</h3>
              <p id="trafficCount" class="group-note"></p>
            </div>
            <div class="mini-actions">
              <button type="button" class="mini secondary" data-group="traffic" data-action="all">전체</button>
              <button type="button" class="mini ghost" data-group="traffic" data-action="clear">해제</button>
            </div>
          </div>
          <div id="trafficList" class="option-grid"></div>
        </div>

        <div class="group-block">
          <div class="group-head">
            <div>
              <h3>카드 / 결제</h3>
              <p id="cardCount" class="group-note"></p>
            </div>
            <div class="mini-actions">
              <button type="button" class="mini secondary" data-group="cards" data-action="all">전체</button>
              <button type="button" class="mini ghost" data-group="cards" data-action="clear">해제</button>
            </div>
          </div>
          <div id="cardList" class="option-grid"></div>
        </div>

        <div class="group-block">
          <div class="group-head">
            <div>
              <h3>항공 / 적립</h3>
              <p id="airlineCount" class="group-note"></p>
            </div>
            <div class="mini-actions">
              <button type="button" class="mini secondary" data-group="airlines" data-action="all">전체</button>
              <button type="button" class="mini ghost" data-group="airlines" data-action="clear">해제</button>
            </div>
          </div>
          <div id="airlineList" class="option-grid"></div>
        </div>

        <div class="group-block">
          <div class="group-head">
            <div>
              <h3>프로모션 페이지</h3>
              <p id="promoCount" class="group-note"></p>
            </div>
            <div class="mini-actions">
              <button type="button" class="mini secondary" data-group="promos" data-action="all">전체</button>
              <button type="button" class="mini ghost" data-group="promos" data-action="clear">해제</button>
            </div>
          </div>
          <div id="promoList" class="option-grid"></div>
        </div>
      </section>
    </main>

    <script src="catalog.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
