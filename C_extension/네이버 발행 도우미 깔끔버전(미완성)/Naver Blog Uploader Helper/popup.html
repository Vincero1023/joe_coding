<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Naver Blog Uploader Helper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h3>네이버 블로그 발행 비서 <span class="badge">Helper</span></h3>
  <p class="tagline">프로필 설정 · 카테고리 선택 · 예약 기준일을 빠르게 세팅하세요.</p>

  <div class="group">
    <div class="panel-heading">
      <span>설정 프로필</span>
      <span class="badge">Profile</span>
    </div>
    <div class="row">
      <select id="profileSelect" style="margin-bottom:0; flex:1;"><option value="default">default</option></select>
      <button id="addProfileBtn" class="btn-mini">+</button>
      <button id="delProfileBtn" class="btn-mini">-</button>
    </div>
  </div>

  <div class="group">
    <div class="panel-heading">
      <span>카테고리</span>
      <span class="badge">Category</span>
    </div>
    <input type="text" id="categoryName" placeholder="예) 잡화" />

    <label>예약 기준일</label>
    <div class="date-btn-group">
      <button id="setTodayBtn" class="date-btn">오늘</button>
      <button id="setTomorrowBtn" class="date-btn">내일</button>
    </div>
    <div class="date-wrapper">
      <input type="number" id="baseYear" class="date-input year num-input" placeholder="2025" />
      <span class="colon">.</span>
      <input type="number" id="baseMonth" class="date-input num-input" placeholder="12" min="1" max="12" />
      <span class="colon">.</span>
      <input type="number" id="baseDay" class="date-input num-input" placeholder="01" min="1" max="31" />
      <button id="applyBaseDateBtn" class="btn-mini" title="기준일 적용">↺</button>
    </div>

    <label>시작 시간</label>
    <div class="time-wrapper">
      <input type="number" id="startHour" class="time-input num-input" min="0" max="23" placeholder="16" />
      <span class="colon">:</span>
      <input type="number" id="startMin" class="time-input num-input" min="0" max="59" placeholder="00" />
      <span class="info">(휠 가능)</span>
    </div>

    <label>발행 간격 (분)</label>
    <input type="number" id="intervalMin" value="60" />

    <hr style="border:0; border-top:1px dashed #1f2937; margin:10px 0;">

    <label>금지 시간 (시:분)</label>
    <div class="time-wrapper">
      <input type="number" id="blockStartH" class="time-input num-input" placeholder="23" />
      <span class="colon">:</span>
      <input type="number" id="blockStartM" class="time-input num-input" placeholder="00" />
      <span class="tilde">~</span>
      <input type="number" id="blockEndH" class="time-input num-input" placeholder="07" />
      <span class="colon">:</span>
      <input type="number" id="blockEndM" class="time-input num-input" placeholder="00" />
    </div>
  </div>

  <div class="group">
    <div class="panel-heading">
      <span>마지막 예약 이력</span>
      <span class="badge">Log</span>
    </div>
    <input type="text" id="lastScheduledInfo" disabled style="background:#1f2937; color:#e5e7eb; border:1px solid #1f2937;" />
    <button id="resetTimeBtn" class="btn btn-warning" style="margin-top:8px;">기록 초기화</button>
  </div>

  <div class="row">
    <button id="saveBtn" class="btn btn-secondary">설정 저장</button>
    <button id="runBtn" class="btn btn-primary">자동 발행 실행</button>
  </div>

  <footer>단축키: Alt + Shift + P</footer>
  <script src="popup.js"></script>
</body>
</html>
